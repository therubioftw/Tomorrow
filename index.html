<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tomorrow.io | Altos Intelligence Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            letter-spacing: -0.011em; 
            background-color: #F8FAFC;
        }

        .glass-card {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 1.25rem;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 280px;
            min-height: 280px;
        }

        .altos-typing::after {
            content: '|';
            animation: blink 1s step-start infinite;
        }
        @keyframes blink { 50% { opacity: 0; } }

        .risk-pill {
            @apply px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest;
        }
        .critical { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .warning { background: #ffedd5; color: #9a3412; border: 1px solid #fed7aa; }
        .nominal { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }

        /* Side Panel Transitions - Sync with JS (350ms) */
        .side-panel {
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.35s ease;
        }

        .side-panel.hidden-panel {
            transform: translateX(100%);
            opacity: 0;
            pointer-events: none;
            position: absolute;
        }

        /* Responsive UI logic */
        @media (max-width: 1023px) {
            .workspace-active .main-chat-window {
                display: none;
            }
            .sidebar-label { display: none !important; }
            .sidebar-container { width: 4.5rem !important; }
            .nav-item-text { display: none !important; }
            .sidebar-nav-item { justify-content: center !important; padding: 0.75rem !important; }
        }

        .location-row:hover {
            background-color: #f1f5f9;
            cursor: pointer;
        }

        .bubble-pulse {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
    </style>
</head>

                <div id="explorer-guidance-box" class="p-6 bg-[#0F172A] text-white rounded-3xl"></div>

    <script>
        const CORE_RISKS = {
            mia: { title: 'Miami Port Terminal', badge: '<span class="risk-pill critical">Critical</span>', metric: '58 mph', metricLabel: 'Wind Gust', prob: '92', guidance: 'Immediate shutdown. Secure all crane gantry systems.', forecast: [22, 28, 45, 58, 52, 40, 32, 25], avg: [18, 19, 21, 22, 21, 20, 19, 18], icon: 'wind', x: '15%', y: '15%' },
            msy: { title: 'New Orleans Terminal', badge: '<span class="risk-pill critical">Critical</span>', metric: '4.2 in', metricLabel: 'Storm Surge', prob: '88', guidance: 'Deploy dock barriers. Verify perimeter water sensors.', forecast: [0.5, 1.2, 2.8, 4.2, 3.8, 2.5, 1.5, 0.8], avg: [0.2, 0.3, 0.4, 0.5, 0.4, 0.3, 0.2, 0.2], icon: 'waves', x: '25%', y: '25%' },
            hou: { title: 'Houston Logistics', badge: '<span class="risk-pill warning">Warning</span>', metric: '1.2 in/h', metricLabel: 'Precipitation', prob: '85', guidance: 'Deploy lightning site team. Prepare sandbags for Sector B.', forecast: [8, 12, 18, 24, 32, 28, 20, 15], avg: [12, 13, 14, 15, 14, 13, 12, 11], icon: 'cloud-lightning', x: '42%', y: '35%' },
            ord: { title: 'Chicago Hub', badge: '<span class="risk-pill warning">Warning</span>', metric: '0.5 in', metricLabel: 'Ice Accrual', prob: '72', guidance: 'Initiate de-icing on loading docks. Suspend shift 3 outdoor duty.', forecast: [0.1, 0.2, 0.4, 0.5, 0.4, 0.3, 0.2, 0.1], avg: [0.0, 0.1, 0.1, 0.2, 0.1, 0.1, 0.0, 0.0], icon: 'snowflake', x: '45%', y: '45%' },
            lax: { title: 'Los Angeles Dist.', badge: '<span class="risk-pill warning">Warning</span>', metric: '12%', metricLabel: 'Humidity (Fire)', prob: '68', guidance: 'Red flag protocol active. Clean all air intake filters.', forecast: [25, 20, 15, 12, 14, 18, 22, 28], avg: [45, 42, 40, 38, 40, 42, 45, 48], icon: 'flame', x: '60%', y: '55%' }
        };

        const FLEET_DATA = { ...CORE_RISKS };
        const cities = ['Atlanta', 'Seattle', 'Boston', 'London', 'Berlin', 'Tokyo', 'Sydney', 'Paris', 'Denver', 'Austin'];
        for (let i = 0; i < 137; i++) {
            const city = cities[i % 10];
            FLEET_DATA[`loc_${i}`] = { title: `${city} Site ${100+i}`, badge: '<span class="risk-pill nominal">Nominal</span>', metric: '9 mph', metricLabel: 'Wind', status: 'nominal' };
        }

        let currentView = 'chat';
        let activeChart = null;
        let fleetDistChart = null;

        function initLibraries(cb) {
            const check = setInterval(() => {
                if (typeof lucide !== 'undefined' && typeof Chart !== 'undefined') { 
                    clearInterval(check); 
                    cb(); 
                }
            }, 300);
        }

        function onTransitionEnd(element, callback) {
            const handle = (e) => {
                if (e.target !== element) return;
                element.removeEventListener('transitionend', handle);
                callback();
            };
            element.addEventListener('transitionend', handle);
        }

        function switchTab(tab) {
            const chatWindow = document.getElementById('main-chat');
            const panel = document.getElementById('context-panel');
            const btns = document.querySelectorAll('.nav-btn');
            
            btns.forEach(b => b.classList.remove('bg-blue-50', 'text-blue-700', 'font-bold', 'border-r-4', 'border-blue-600'));
            const activeBtn = document.getElementById(`btn-${tab}`);
            if (activeBtn) activeBtn.classList.add('bg-blue-50', 'text-blue-700', 'font-bold', 'border-r-4', 'border-blue-600');

            if (tab === 'chat') {
                chatWindow.classList.remove('hidden');
                document.body.classList.remove('workspace-active');
                panel.classList.add('hidden-panel');
            } else {
                document.body.classList.add('workspace-active');
                toggleContext(tab);
            }
        }

        function toggleContext(type) {
            const panel = document.getElementById('context-panel');
            const content = document.getElementById('panel-content');
            const title = document.getElementById('panel-title');
            
            if (!panel || !content) return;
            panel.classList.remove('hidden-panel');
            content.innerHTML = '';
            
            if (type === 'matrix') {
                title.innerText = 'Risk Priority Matrix';
                content.innerHTML = document.getElementById('tpl-matrix').innerHTML;
                populateMatrixPoints();
                onTransitionEnd(panel, () => renderFleetDistribution());
            } else if (type === 'fleet') {
                title.innerText = 'Fleet Status';
                content.innerHTML = document.getElementById('tpl-fleet').innerHTML;
                populateFleetTable();
            } else if (type === 'insights') {
                title.innerText = 'Historical Explorer';
                content.innerHTML = document.getElementById('tpl-explorer').innerHTML;
                populateExplorerSelect();
            }
            if (window.lucide) lucide.createIcons();
        }

        function renderFleetDistribution() {
            const mount = document.getElementById('fleet-dist-mount');
            if (!mount || typeof Chart === 'undefined') return;
            mount.innerHTML = '<canvas id="fleetDistChart"></canvas>';
            const canvas = document.getElementById('fleetDistChart');
            const ctx = canvas.getContext('2d');
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['Critical', 'Warning', 'Nominal'],
                    datasets: [{
                        data: [2, 3, 137],
                        backgroundColor: ['#EF4444', '#F97316', '#10B981'],
                        borderRadius: 8,
                        barThickness: 50
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: '#F1F5F9' }, ticks: { font: { weight: 'bold' } } },
                        x: { grid: { display: false }, ticks: { font: { weight: 'bold' } } }
                    }
                }
            });
        }

        function populateMatrixPoints() {
            const container = document.getElementById('matrix-points');
            if (!container) return;
            Object.keys(CORE_RISKS).forEach(key => {
                const loc = CORE_RISKS[key];
                const div = document.createElement('div');
                div.className = `absolute cursor-pointer group z-10 transition-transform hover:scale-110`;
                div.style.top = loc.y; div.style.right = loc.x;
                div.onclick = () => openLocationDetail(key);
                div.innerHTML = `<div class="w-10 h-10 ${loc.badge.includes('critical') ? 'bg-red-600 bubble-pulse' : 'bg-orange-500'} rounded-xl border-2 border-white shadow-xl flex items-center justify-center text-white font-black text-[10px]">${key.toUpperCase()}</div>`;
                container.appendChild(div);
            });
        }

        function populateFleetTable() {
            const tbody = document.getElementById('fleet-table-body');
            if (!tbody) return;
            const keys = Object.keys(FLEET_DATA).sort((a,b) => {
                const rA = FLEET_DATA[a].badge.includes('critical') ? 2 : (FLEET_DATA[a].badge.includes('warning') ? 1 : 0);
                const rB = FLEET_DATA[b].badge.includes('critical') ? 2 : (FLEET_DATA[b].badge.includes('warning') ? 1 : 0);
                return rB - rA;
            });
            keys.forEach(k => {
                const l = FLEET_DATA[k];
                const tr = document.createElement('tr');
                tr.className = 'location-row border-b border-slate-50';
                tr.onclick = () => openLocationDetail(k);
                tr.innerHTML = `<td class="px-4 py-4 font-bold text-slate-700">${l.title}</td><td class="px-4 py-4">${l.badge}</td><td class="px-4 py-4 text-right font-bold text-slate-500">${l.metric}</td>`;
                tbody.appendChild(tr);
            });
        }

        function populateExplorerSelect() {
            const sel = document.getElementById('explorer-select');
            if (!sel) return;
            Object.keys(CORE_RISKS).forEach(k => {
                const opt = document.createElement('option');
                opt.value = k; opt.innerText = CORE_RISKS[k].title;
                sel.appendChild(opt);
            });
        }

        function openLocationDetail(id) {
            const data = FLEET_DATA[id];
            const content = document.getElementById('panel-content');
            const panel = document.getElementById('context-panel');
            if (!data || !content) return;

            if (!data.forecast) {
                content.innerHTML = `<div class="p-12 text-center text-slate-400 font-bold"> telemetry for nominal sites is currently archived. No anomalies detected.</div>`;
                return;
            }

            panel.classList.remove('hidden-panel');
            document.getElementById('panel-title').innerText = data.title;
            document.getElementById('panel-badge').innerHTML = data.badge;
            
            const viz = document.getElementById('explorer-viz');
            if (viz) {
                viz.classList.remove('hidden');
                document.getElementById('explorer-guidance-box').innerHTML = `<p class="text-sm font-bold text-blue-400 uppercase mb-2">Mitigation Guidance</p><p class="text-sm">${data.guidance}</p>`;
            } else {
                content.innerHTML = `
                    <div class="space-y-6 animate-in fade-in duration-500">
                        <div class="grid grid-cols-2 gap-4">
                            <div class="glass-card p-5"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Peak Forecast</p><p class="text-2xl font-black text-slate-900">${data.metric}</p></div>
                            <div class="glass-card p-5"><p class="text-[9px] font-bold text-slate-400 uppercase mb-1">Prob</p><p class="text-2xl font-black text-slate-900">${data.prob}%</p></div>
                        </div>
                        <div class="glass-card p-6">
                            <div class="chart-container" id="loc-chart-mount"></div>
                        </div>
                        <div class="p-6 bg-[#0F172A] text-white rounded-3xl" id="guidance-box"><p class="text-sm">${data.guidance}</p></div>
                    </div>
                `;
            }

            if (window.lucide) lucide.createIcons();
            
            // Critical: Wait for transition to end before rendering
            onTransitionEnd(panel, () => renderLocChart(data));
        }

        function renderLocChart(data) {
            const mount = document.getElementById('loc-chart-mount');
            if (!mount || typeof Chart === 'undefined') return;
            
            mount.innerHTML = '<canvas id="locChart"></canvas>';
            const canvas = document.getElementById('locChart');
            const ctx = canvas.getContext('2d');
            
            const color = data.badge.includes('critical') ? '#EF4444' : '#F97316';
            const labels = ['08:00', '10:00', '12:00', '14:00', '16:00', '18:00', '20:00', '22:00'];
            
            activeChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        { 
                            label: 'V4 Forecast', 
                            data: data.forecast, 
                            borderColor: color, 
                            borderWidth: 5, 
                            tension: 0.35, 
                            fill: true, 
                            backgroundColor: color + '22',
                            pointRadius: 6,
                            pointHoverRadius: 8,
                            pointBackgroundColor: '#FFFFFF',
                            pointBorderColor: color,
                            pointBorderWidth: 2
                        },
                        { 
                            label: 'Historical Climatology', 
                            data: data.avg, 
                            borderColor: '#94A3B8', 
                            borderDash: [8, 4], 
                            borderWidth: 2, 
                            pointRadius: 0, 
                            tension: 0.35 
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false, 
                    devicePixelRatio: 2,
                    animation: { duration: 600 },
                    plugins: { 
                        legend: { display: false },
                        tooltip: { 
                            enabled: true,
                            backgroundColor: '#0F172A',
                            titleFont: { size: 11 },
                            bodyFont: { size: 11 },
                            padding: 10
                        }
                    }, 
                    scales: { 
                        y: { 
                            beginAtZero: true, 
                            grid: { color: '#F1F5F9', drawTicks: false }, 
                            ticks: { font: { weight: 'bold', size: 10 }, color: '#64748B', padding: 10 } 
                        }, 
                        x: { 
                            grid: { display: false }, 
                            ticks: { font: { weight: 'bold', size: 10 }, color: '#64748B', padding: 10 } 
                        } 
                    } 
                }
            });
        }

        function closeContext() { switchTab('chat'); }

        function simulateAltos() {
            const txt = "Morning. I've synthesized risks for 142 locations. 5 require immediate mitigation guidance due to significant threshold breaches.";
            const target = document.getElementById('initial-text');
            if (!target) return;
            let i = 0;
            const t = setInterval(() => {
                target.innerText += txt.charAt(i); i++;
                if (i >= txt.length) {
                    clearInterval(t);
                    target.classList.remove('altos-typing');
                    const container = document.getElementById('initial-actions');
                    if (container) {
                        container.classList.remove('hidden');
                        Object.keys(CORE_RISKS).forEach(k => {
                            const d = CORE_RISKS[k];
                            container.innerHTML += `<button onclick="openLocationDetail('${k}')" class="text-left bg-white border border-slate-100 p-5 rounded-2xl hover:border-blue-200 transition-all flex flex-col group"><div class="flex justify-between items-start mb-4"><div class="p-2 bg-slate-50 text-slate-600 rounded-lg group-hover:bg-blue-600 group-hover:text-white transition-colors"><i data-lucide="${d.icon}" class="w-5 h-5"></i></div>${d.badge}</div><h4 class="font-bold text-slate-900">${d.title}</h4></button>`;
                        });
                    }
                    document.getElementById('additional-briefing')?.classList.remove('hidden');
                    if (window.lucide) lucide.createIcons();
                    scrollChat();
                }
            }, 15);
        }

        function handleSendMessage() {
            const inp = document.getElementById('chat-input');
            if (!inp || !inp.value.trim()) return;
            const mount = document.getElementById('chat-mount');
            if (mount) {
                mount.innerHTML += `<div class="flex justify-end mb-8 max-w-4xl mx-auto"><div class="bg-blue-600 text-white p-6 rounded-[2rem] rounded-tr-none shadow-xl text-base font-semibold max-w-[80%]">${inp.value}</div></div>`;
                inp.value = ''; 
                scrollChat();
            }
        }

        function scrollChat() { const win = document.getElementById('chat-window'); if (win) win.scrollTop = win.scrollHeight; }

        initLibraries(() => { 
            if (window.lucide) lucide.createIcons(); 
            simulateAltos(); 
        });
    </script>
</body>
</html>
